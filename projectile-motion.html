---
layout: simulation
title: "Projectile Motion"
sim_script: /assets/js/projectile-motion/projectile-motion-app.js
---

<aside class="panel">
  <div class="nav-links">
    <a href="{{ '/' | relative_url }}" class="nav-link">← Home</a>
    <a href="{{ '/projectile-motion-theory/' | relative_url }}" class="nav-link">📚 Theory</a>
  </div>

  <h1>Projectile Motion</h1>

  <div class="field">
    <label for="speed">Initial velocity (m/s)</label>
    <input id="speed" type="number" min="1" max="200" step="1" value="40" />
  </div>

  <div class="field">
    <label for="angle">Launch angle (degrees)</label>
    <input id="angle" type="number" min="1" max="89" step="1" value="45" />
  </div>

  <button id="launchButton">Launch projectile</button>

  <div class="stats">
    <div><strong>Time:</strong> <span id="timeValue">0.00</span> s</div>
    <div><strong>X:</strong> <span id="xValue">0.00</span> m</div>
    <div><strong>Y:</strong> <span id="yValue">0.00</span> m</div>
  </div>
</aside>

<main class="canvas-wrap">
  <canvas id="scene" width="900" height="500"></canvas>
</main>
