<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Position vs time graph for uniform motion">

  <!--
    Layout:
      origin  (O)  → pixel (80, 300)
      t-axis  → x grows right,  1 unit = 90px  → t=4 at x=440
      x-axis  → y grows up,     1 unit = 60px  → x=4 at y=60
      t₀=1  → px_x = 80 + 1*90 = 170
      tf=3  → px_x = 80 + 3*90 = 350
      x₀=1  → px_y = 300 - 1*60 = 240
      xf=3  → px_y = 300 - 3*60 = 120
  -->

  <!-- Background -->
  <rect width="500" height="400" fill="#111827" rx="12"/>

  <!-- ── Grid ── -->
  <!-- vertical grid lines at t=1,2,3,4 -->
  <line x1="170" y1="40" x2="170" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="350" y1="40" x2="350" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="440" y1="40" x2="440" y2="300" stroke="#1f2937" stroke-width="1"/>
  <!-- horizontal grid lines at x=1,2,3,4 -->
  <line x1="80" y1="240" x2="455" y2="240" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="180" x2="455" y2="180" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="120" x2="455" y2="120" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="60"  x2="455" y2="60"  stroke="#1f2937" stroke-width="1"/>

  <!-- ── Axes ── -->
  <line x1="80" y1="300" x2="458" y2="300" stroke="#9ca3af" stroke-width="2"/>
  <line x1="80" y1="308" x2="80"  y2="32"  stroke="#9ca3af" stroke-width="2"/>
  <!-- arrows -->
  <polygon points="458,300 448,295 448,305" fill="#9ca3af"/>
  <polygon points="80,32 74,44 86,44" fill="#9ca3af"/>
  <!-- axis name labels -->
  <text x="466" y="305" fill="#9ca3af" font-size="16" text-anchor="start" font-family="Georgia,serif" font-style="italic">t</text>
  <text x="68"  y="28"  fill="#9ca3af" font-size="16" text-anchor="end"   font-family="Georgia,serif" font-style="italic">x</text>

  <!-- ── Tick marks & labels: t axis ── -->
  <line x1="170" y1="297" x2="170" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="260" y1="297" x2="260" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="350" y1="297" x2="350" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="440" y1="297" x2="440" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <text x="170" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">1</text>
  <text x="260" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">2</text>
  <text x="350" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">3</text>
  <text x="440" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">4</text>

  <!-- ── Tick marks & labels: x axis ── -->
  <line x1="77" y1="240" x2="83" y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="180" x2="83" y2="180" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="120" x2="83" y2="120" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="60"  x2="83" y2="60"  stroke="#6b7280" stroke-width="1.5"/>
  <text x="70" y="244" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">1</text>
  <text x="70" y="184" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">2</text>
  <text x="70" y="124" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">3</text>
  <text x="70" y="64"  fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">4</text>

  <!-- ── Projection dashed lines ── -->
  <!-- t₀=1 vertical drop to x-axis -->
  <line x1="170" y1="240" x2="170" y2="300" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- tf=3 vertical drop to x-axis -->
  <line x1="350" y1="120" x2="350" y2="300" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- x₀=1 horizontal to y-axis -->
  <line x1="80" y1="240" x2="170" y2="240" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- xf=3 horizontal to y-axis -->
  <line x1="80" y1="120" x2="350" y2="120" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ── x(t) line extended slightly beyond the two key points ── -->
  <!-- passes through (170,240) and (350,120), extended from t≈0.3 to t≈3.7 -->
  <!-- at t=0: x = 1 - 1*(slope) → slope = (3-1)/(3-1)=1, so at t=0 x=0 → (80,300) -->
  <!-- at t=4: x=4 → y=300-4*60=60 → (440,60) -->
  <line x1="80" y1="300" x2="440" y2="60" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Key points ── -->
  <!-- A = (t₀, x₀) = (170, 240) -->
  <circle cx="170" cy="240" r="5" fill="#60a5fa" stroke="#111827" stroke-width="1.5"/>
  <!-- B = (tf, xf) = (350, 120) -->
  <circle cx="350" cy="120" r="5" fill="#60a5fa" stroke="#111827" stroke-width="1.5"/>

  <!-- ── t₀ / tf labels on t-axis ── -->
  <text x="170" y="338" fill="#93c5fd" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">t<tspan baseline-shift="sub" font-size="10">0</tspan></text>
  <text x="350" y="338" fill="#93c5fd" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">t<tspan baseline-shift="sub" font-size="10">f</tspan></text>

  <!-- ── x₀ / xf labels on x-axis ── -->
  <text x="58" y="244" fill="#93c5fd" font-size="13" text-anchor="end" font-family="Georgia,serif" font-style="italic">x<tspan baseline-shift="sub" font-size="10">0</tspan></text>
  <text x="58" y="124" fill="#93c5fd" font-size="13" text-anchor="end" font-family="Georgia,serif" font-style="italic">x<tspan baseline-shift="sub" font-size="10">f</tspan></text>

  <!-- ── Δt annotation (horizontal bracket below the line) ── -->
  <line x1="170" y1="268" x2="350" y2="268" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="170" y1="264" x2="170" y2="272" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="350" y1="264" x2="350" y2="272" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="260" y="285" fill="#fbbf24" font-size="13" text-anchor="middle" font-family="Georgia,serif">&#x0394;t = t<tspan baseline-shift="sub" font-size="10">f</tspan> &#x2212; t<tspan baseline-shift="sub" font-size="10">0</tspan></text>

  <!-- ── Δx annotation (vertical bracket left of line) ── -->
  <line x1="52" y1="120" x2="52" y2="240" stroke="#34d399" stroke-width="1.5"/>
  <line x1="48" y1="120" x2="56" y2="120" stroke="#34d399" stroke-width="1.5"/>
  <line x1="48" y1="240" x2="56" y2="240" stroke="#34d399" stroke-width="1.5"/>
  <text x="44" y="186" fill="#34d399" font-size="13" text-anchor="middle" font-family="Georgia,serif" transform="rotate(-90,44,186)">&#x0394;x = x<tspan baseline-shift="sub" font-size="10">f</tspan> &#x2212; x<tspan baseline-shift="sub" font-size="10">0</tspan></text>

  <!-- ── v = Δx/Δt label near the line ── -->
  <text x="320" y="205" fill="#a5b4fc" font-size="14" text-anchor="middle" font-family="Georgia,serif" font-style="italic">v = &#x0394;x / &#x0394;t</text>

  <!-- ── Caption ── -->
  <text x="270" y="375" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">x(t) = x<tspan baseline-shift="sub" font-size="10">0</tspan> + v&#xB7;(t &#x2212; t<tspan baseline-shift="sub" font-size="10">0</tspan>)</text>

</svg>
