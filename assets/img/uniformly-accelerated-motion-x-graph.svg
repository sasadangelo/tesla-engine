<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Position vs time graph for uniformly accelerated motion">

  <!--
    Layout:
      origin  (O)  → pixel (80, 300)
      t-axis  → x grows right,  1 unit = 90 px
      x-axis  → y grows up,     1 unit = 60 px

    Parabola parameters: x₀=1, v₀=0.5, a=1, t₀=1
      x(t) = 1 + 0.5·(t−1) + 0.5·(t−1)²

    Sampled pixels:
      t=1.0 → x=1.000 → (170, 240)   ← A = (t₀, x₀)
      t=1.5 → x=1.375 → (215, 218)
      t=2.0 → x=2.000 → (260, 180)
      t=2.5 → x=2.875 → (305, 128)
      t=3.0 → x=4.000 → (350,  60)   ← B = (t, x(t))

    Quadratic bezier (one segment, control point verified):
      P0=(170,240)  C=(260,210)  P2=(350,60)
      midpoint at s=0.5 → (260, 180) ✓

    Tangent at t₀ (slope=v₀=0.5 unit/unit = −1/3 py/px):
      from (110, 260) to (230, 220)
  -->

  <!-- Background -->
  <rect width="500" height="400" fill="#111827" rx="12"/>

  <!-- ── Grid ── -->
  <line x1="170" y1="40" x2="170" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="350" y1="40" x2="350" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="440" y1="40" x2="440" y2="300" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="240" x2="455" y2="240" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="180" x2="455" y2="180" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="120" x2="455" y2="120" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="60"  x2="455" y2="60"  stroke="#1f2937" stroke-width="1"/>

  <!-- ── Axes ── -->
  <line x1="80" y1="300" x2="458" y2="300" stroke="#9ca3af" stroke-width="2"/>
  <line x1="80" y1="308" x2="80"  y2="32"  stroke="#9ca3af" stroke-width="2"/>
  <polygon points="458,300 448,295 448,305" fill="#9ca3af"/>
  <polygon points="80,32 74,44 86,44" fill="#9ca3af"/>
  <text x="466" y="305" fill="#9ca3af" font-size="16" text-anchor="start" font-family="Georgia,serif" font-style="italic">t</text>
  <text x="68"  y="28"  fill="#9ca3af" font-size="16" text-anchor="end"   font-family="Georgia,serif" font-style="italic">x</text>

  <!-- ── Tick marks &amp; labels: t axis ── -->
  <line x1="170" y1="297" x2="170" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="260" y1="297" x2="260" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="350" y1="297" x2="350" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="440" y1="297" x2="440" y2="303" stroke="#6b7280" stroke-width="1.5"/>
  <text x="170" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">1</text>
  <text x="260" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">2</text>
  <text x="350" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">3</text>
  <text x="440" y="318" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif">4</text>

  <!-- ── Tick marks &amp; labels: x axis ── -->
  <line x1="77" y1="240" x2="83" y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="180" x2="83" y2="180" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="120" x2="83" y2="120" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="77" y1="60"  x2="83" y2="60"  stroke="#6b7280" stroke-width="1.5"/>
  <text x="70" y="244" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">1</text>
  <text x="70" y="184" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">2</text>
  <text x="70" y="124" fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">3</text>
  <text x="70" y="64"  fill="#6b7280" font-size="13" text-anchor="end" font-family="Georgia,serif">4</text>

  <!-- ── Parabola: single quadratic bezier ── -->
  <!-- P0=(170,240)  C=(260,210)  P2=(350,60) -->
  <path d="M 170,240 Q 260,210 350,60"
        stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ── Tangent at t₀ showing initial slope v₀ ── -->
  <!-- slope = v₀ = 0.5 unit/unit → −1/3 py/px in pixel space -->
  <!-- segment: (110,260) → (230,220) -->
  <line x1="110" y1="260" x2="230" y2="220" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.85"/>

  <!-- ── Projection dashed lines ── -->
  <!-- x₀=1 horizontal to y-axis (from A=(170,240) leftward) -->
  <line x1="80"  y1="240" x2="170" y2="240" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- t₀=1 vertical drop to t-axis -->
  <line x1="170" y1="240" x2="170" y2="300" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- t=3 vertical drop to t-axis -->
  <line x1="350" y1="60"  x2="350" y2="300" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- x(t)=4 horizontal to y-axis -->
  <line x1="80"  y1="60"  x2="350" y2="60"  stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ── Key points ── -->
  <!-- A = (t₀=1, x₀=1) -->
  <circle cx="170" cy="240" r="5" fill="#60a5fa" stroke="#111827" stroke-width="1.5"/>
  <!-- B = (t=3, x(t)=4) -->
  <circle cx="350" cy="60"  r="5" fill="#60a5fa" stroke="#111827" stroke-width="1.5"/>

  <!-- ── t₀ / t labels on t-axis ── -->
  <text x="170" y="338" fill="#93c5fd" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">t<tspan baseline-shift="sub" font-size="10">0</tspan></text>
  <text x="350" y="338" fill="#93c5fd" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">t</text>

  <!-- ── x₀ / x(t) labels on x-axis ── -->
  <text x="60" y="244" fill="#93c5fd" font-size="13" text-anchor="end" font-family="Georgia,serif" font-style="italic">x<tspan baseline-shift="sub" font-size="10">0</tspan></text>
  <text x="60" y="64"  fill="#93c5fd" font-size="13" text-anchor="end" font-family="Georgia,serif" font-style="italic">x(t)</text>

  <!-- ── Δt annotation (horizontal bracket below the two key t values) ── -->
  <line x1="170" y1="322" x2="350" y2="322" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="170" y1="318" x2="170" y2="326" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="350" y1="318" x2="350" y2="326" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="260" y="339" fill="#fbbf24" font-size="13" text-anchor="middle" font-family="Georgia,serif">&#x0394;t = t &#x2212; t<tspan baseline-shift="sub" font-size="10">0</tspan></text>

  <!-- ── Δx annotation (vertical bracket on left) ── -->
  <line x1="52" y1="60"  x2="52" y2="240" stroke="#34d399" stroke-width="1.5"/>
  <line x1="48" y1="60"  x2="56" y2="60"  stroke="#34d399" stroke-width="1.5"/>
  <line x1="48" y1="240" x2="56" y2="240" stroke="#34d399" stroke-width="1.5"/>
  <text x="44" y="154" fill="#34d399" font-size="13" text-anchor="middle" font-family="Georgia,serif" transform="rotate(-90,44,154)">&#x0394;x = x(t) &#x2212; x<tspan baseline-shift="sub" font-size="10">0</tspan></text>

  <!-- ── v₀ tangent label ── -->
  <text x="248" y="212" fill="#f97316" font-size="12" text-anchor="middle" font-family="Georgia,serif" font-style="italic">slope = v<tspan baseline-shift="sub" font-size="9">0</tspan></text>

  <!-- ── Caption ── -->
  <text x="270" y="375" fill="#6b7280" font-size="12" text-anchor="middle" font-family="Georgia,serif" font-style="italic">x(t) = x<tspan baseline-shift="sub" font-size="9">0</tspan> + v<tspan baseline-shift="sub" font-size="9">0</tspan>&#xB7;(t&#x2212;t<tspan baseline-shift="sub" font-size="9">0</tspan>) + &#xBD;&#xB7;a&#xB7;(t&#x2212;t<tspan baseline-shift="sub" font-size="9">0</tspan>)&#xB2;</text>

</svg>
