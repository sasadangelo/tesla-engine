<svg viewBox="0 0 400 410" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A vector as an arrow from the origin O to a point P with coordinates Vx, Vy in a Cartesian plane">

  <!--
    Layout:
      origin (O) → pixel (60, 340)
      P = (Vx, Vy) → pixel (300, 180)
      x-axis → pixel x grows right
      y-axis → pixel y grows up (screen y decreases)
  -->

  <!-- Background -->
  <rect width="400" height="410" fill="#111827" rx="12"/>

  <!-- ── Axes ── -->
  <line x1="40" y1="340" x2="365" y2="340" stroke="#9ca3af" stroke-width="2"/>
  <line x1="60" y1="360" x2="60" y2="25" stroke="#9ca3af" stroke-width="2"/>
  <!-- arrowheads -->
  <polygon points="365,340 355,335 355,345" fill="#9ca3af"/>
  <polygon points="60,25 54,37 66,37" fill="#9ca3af"/>
  <!-- axis name labels -->
  <text x="378" y="345" fill="#9ca3af" font-size="16" text-anchor="start" font-family="Georgia,serif" font-style="italic">x</text>
  <text x="48" y="20" fill="#9ca3af" font-size="16" text-anchor="end" font-family="Georgia,serif" font-style="italic">y</text>

  <!-- ── Origin label ── -->
  <text x="48" y="354" fill="#9ca3af" font-size="14" text-anchor="end" font-family="Georgia,serif" font-style="italic">O</text>

  <!-- ── Projection dashed lines (components) ── -->
  <line x1="300" y1="180" x2="300" y2="340" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="60" y1="180" x2="300" y2="180" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ── Angle θ arc ── -->
  <path d="M 100,340 A 40,40 0 0,1 93.3,317.8" stroke="#f472b6" stroke-width="1.5" fill="none"/>
  <text x="114" y="325" fill="#f472b6" font-size="14" text-anchor="middle" font-family="Georgia,serif" font-style="italic">&#x03B8;</text>

  <!-- ── Vector arrow: O → P ── -->
  <line x1="60" y1="340" x2="300" y2="180" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="300,180 288,174 288,186" fill="#60a5fa" transform="rotate(-33.69 300 180)"/>

  <!-- ── Point P ── -->
  <circle cx="300" cy="180" r="5" fill="#60a5fa" stroke="#111827" stroke-width="1.5"/>
  <text x="310" y="168" fill="#93c5fd" font-size="13" text-anchor="start" font-family="Georgia,serif" font-style="italic">P(V<tspan baseline-shift="sub" font-size="10">x</tspan>, V<tspan baseline-shift="sub" font-size="10">y</tspan>)</text>

  <!-- ── Vector label v (with hat arrow) ── -->
  <text x="164" y="238" fill="#60a5fa" font-size="16" text-anchor="middle" font-family="Georgia,serif" font-style="italic">v&#x20D7;</text>

  <!-- ── Component labels ── -->
  <text x="300" y="358" fill="#fbbf24" font-size="13" text-anchor="middle" font-family="Georgia,serif">V<tspan baseline-shift="sub" font-size="10">x</tspan></text>
  <text x="44" y="184" fill="#34d399" font-size="13" text-anchor="end" font-family="Georgia,serif">V<tspan baseline-shift="sub" font-size="10">y</tspan></text>

  <!-- ── Caption ── -->
  <text x="200" y="395" fill="#6b7280" font-size="13" text-anchor="middle" font-family="Georgia,serif" font-style="italic">The vector v is the arrow from the origin O to the point P = (V<tspan baseline-shift="sub" font-size="10">x</tspan>, V<tspan baseline-shift="sub" font-size="10">y</tspan>)</text>

</svg>
