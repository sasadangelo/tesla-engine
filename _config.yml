# Jekyll configuration - DEVELOPMENT
title: "Tesla Engine"
description: "Interactive Physics Simulations"
url: "http://localhost:5001"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "theory"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - _config_prod.yml
  - node_modules/
  - vendor/
